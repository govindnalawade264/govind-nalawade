# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=Employee Management System

# ===================================
# H2 IN-MEMORY DATABASE (Default - No MySQL needed)
# ===================================
#spring.datasource.url=jdbc:h2:mem:empdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# ===================================
# MYSQL DATABASE (Uncomment to use MySQL)
# ===================================
 spring.datasource.url=jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
 spring.datasource.username=root
 spring.datasource.password=root123
 spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# For MySQL use: org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# THYMELEAF
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===================================
# SERVER
# ===================================
server.port=8080

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================================
# LOGGING
# ===================================
logging.level.org.springframework=INFO
logging.level.com.emp=DEBUG
